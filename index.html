<style>

// Auto-merkintä: kääri lyhenteiden ensiesiintymät <abbr>-elementtiin (pisteviiva + klikkaus)
let GLOSS_RE = null;
function glossRe() {
  if (GLOSS_RE !== null) return GLOSS_RE;
  const terms = ABBR.filter(e => !e.noauto && /^[A-Za-z][A-Za-z0-9]*$/.test(e.term)).map(e => e.term).sort((a, b) => b.length - a.length);
  // Sallitaan suomen taivutuspääte lyhenteen perässä (Luken, WWF:n, EFSA:n) — vain termi kääritään.
  GLOSS_RE = terms.length ? new RegExp('\\b(' + terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')(:?[a-zäöå]{0,4})?\\b', 'g') : false;
  return GLOSS_RE;
}
function glossLinkify(root) {
  const re = glossRe(); if (!re || !root) return;
  const SKIP = { A: 1, ABBR: 1, BUTTON: 1, CODE: 1, PRE: 1, SCRIPT: 1, STYLE: 1, TEXTAREA: 1, INPUT: 1, H1: 1, SUMMARY: 1 };
  const seen = new Set();
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (!node.nodeValue || node.nodeValue.length < 2) return NodeFilter.FILTER_REJECT;
      let p = node.parentNode;
      while (p && p !== root) { if (SKIP[p.nodeName]) return NodeFilter.FILTER_REJECT; p = p.parentNode; }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = []; let nn; while (nn = walker.nextNode()) nodes.push(nn);
  nodes.forEach(node => {
    const text = node.nodeValue; re.lastIndex = 0;
    let m, last = 0, parts = null;
    while (m = re.exec(text)) {
      const term = m[1]; if (seen.has(term)) continue; seen.add(term);
      if (!parts) parts = [];
      parts.push(document.createTextNode(text.slice(last, m.index)));
      const ab = document.createElement('abbr');
      ab.className = 'gloss'; ab.textContent = term;
      ab.setAttribute('onclick', "glossShow('" + term + "')");
      ab.title = GLOSS[term] ? GLOSS[term].full : '';
      parts.push(ab); last = m.index + term.length;
    }
    if (parts) { parts.push(document.createTextNode(text.slice(last))); const frag = document.createDocumentFragment(); parts.forEach(x => frag.appendChild(x)); node.parentNode.replaceChild(frag, node); }
  });
}

/* ---- AI-täydennys: efektiiviset arvot alkuperätiedolla ----
   Suora data (seeds/JSON-LD) voittaa aina; it.ai-tägit (tools/ai_enrich.py)
   täydentävät vain puuttuvan/"muu"-arvon, ja vain kun kytkin on päällä. */
let aiOn = localStorage.getItem('myfood_aiOn') !== '0';
window.toggleAI = () => { aiOn = !aiOn; localStorage.setItem('myfood_aiOn', aiOn ? '1' : '0'); render(); };
// → {vals: ['pannu',…], ai: bool} — ai=true kun arvo on LLM-päätelty
function effMethods(it) {
  const own = (it.method || '').split('+').filter(m => m && m !== 'muu');
  if (own.length) return { vals: own, ai: false };
  if (aiOn && it.ai && it.ai.method) return { vals: [it.ai.method.v], ai: true };
  return { vals: ['muu'], ai: false };
}
// → {v: minuutit|null, o: 'suora'|'heuristinen'|'ai'|null}
function effMinutes(it) {
  if (it.total_minutes != null) return { v: it.total_minutes, o: 'suora' };
  if (aiOn && it.ai && it.ai.total_minutes) return { v: it.ai.total_minutes.v, o: it.ai.total_minutes.o };
  return { v: null, o: null };
}
/* ---- Lajiontologia: species-taulu on koko sovelluksen yhteinen lajisanasto,
   ja effSpecies() on AINOA paikka jossa reseptin lajijoukko tulkitaan.
   Kaikki lajinäkymät (Kalalajit-jakauma, suodattimet, Järvikalat-kortit,
   lajipopupin reseptilistat, badget) kutsuvat tätä — sama resepti kuuluu
   samoihin lajeihin kaikkialla. Monilajisuus: yksi resepti voi kuulua moneen
   lajiin (suora seeds-laji ∪ AI:n tunnistamat recipe_species-linkit). */
// → {slugs: ['kuha','lohi',…], aiSlugs: Set(AI-peräiset), own: suora slug}
function effSpecies(it) {
  const own = it.species_slug;
  const slugs = [own];
  const aiSlugs = new Set();
  if (aiOn && it.ai_species) {
    for (const s of it.ai_species) {
      if (!slugs.includes(s.slug)) { slugs.push(s.slug); aiSlugs.add(s.slug); }
    }
  }
  return { slugs, aiSlugs, own };
}

const TIMEBUCKETS = [
  ['≤ 15 min', m => m != null && m <= 15],
  ['16–30 min', m => m != null && m > 15 && m <= 30],
  ['31–45 min', m => m != null && m > 30 && m <= 45],

];

function recipeCats(it) {
  const cats = new Set();
  it.norm.forEach(s => { if (ING[s]) cats.add(ING[s].category); });
  return cats;
}

function passes(it, skip) {
  if (q) {
    const hay = (it.title + ' ' + it.description + ' ' + it.ingredients.join(' ') + ' ' + it.instructions.join(' ') + ' ' + (it.norm || []).map(s => ING[s]?.name || '').join(' ')).toLowerCase();
    if (!q.toLowerCase().split(/\s+/).every(w => hay.includes(w))) return false;
  }
  if (skip !== 'species' && F.species && !effSpecies(it).slugs.includes(F.species)) return false;
  if (skip !== 'method' && F.method && !effMethods(it).vals.includes(F.method)) return false;
  if (skip !== 'ingCat' && F.ingCat && !recipeCats(it).has(F.ingCat)) return false;
  if (skip !== 'ings' && F.ings.length && !F.ings.every(s => it.norm.includes(s))) return false;
  if (skip !== 'time' && F.time != null && !TIMEBUCKETS[F.time][1](effMinutes(it).v)) return false;
  if (skip !== 'site' && F.site && it.site !== F.site) return false;
  if (skip !== 'side' && F.side && !(it.sides || []).includes(F.side)) return false;
  for (const g of F.exGroups) {
    const gr = EX_GROUPS[g]; if (!gr) continue;
    if (gr.cat && recipeCats(it).has(gr.cat)) return false;
    if (gr.slugs && it.norm.some(s => gr.slugs.includes(s))) return false;
  }
  return true;
}

// Palkkigraafi: yksi sarja → yksi väri (sekventiaali sininen); valinta = korostus,
// muut haalenevat. Arvo palkin kärjessä, hover-tooltip, klikkaus poraa.

// → piirretään raidoitettuna ✨-häntäsegmenttinä suoran osuuden perään.
function barChart({ title, sub, rows, onclickName }) {
  const max = Math.max(1, ...rows.map(r => r.count));
  const anySel = rows.some(r => r.selected);
  return `<div class="chartcard"><h3>${esc(title)}</h3><div class="sub">${esc(sub)}</div>` +
    rows.map(r => {
      const w = Math.max(Math.round(r.count / max * 100), 2);
      const aiC = r.aiCount || 0;
      const wAi = aiC ? Math.max(Math.round(aiC / max * 100), 1) : 0;
      const cls = r.selected ? 'sel' : (anySel ? 'dim' : '');
      const cnt = aiC ? `${r.count} reseptiä (${r.count - aiC} suoraan + ${aiC} ✨ päätelty) · ${r.pct} %`
                      : `${r.count} reseptiä · ${r.pct} %`;
      return `<div class="brow ${cls}">
        <div class="blabel" title="${esc(r.label)}">${aiC ? '✨ ' : ''}${esc(r.label)}</div>
        <div class="btrack" onclick="${onclickName}('${esc(String(r.key)).replace(/'/g, "\\'")}')"
             data-tip="${esc(r.label)}|${cnt}|${r.selected ? 'Klikkaa poistaaksesi suodattimen' : 'Klikkaa porautuaksesi'}">
          <div class="bfill${aiC ? ' hasai' : ''}" style="width:${Math.max(w - wAi, 1)}%"></div>
          ${aiC ? `<div class="bfill aix" style="width:${wAi}%"></div>` : ''}
        </div>
        <div class="bval">${r.count}</div>
      </div>`;
    }).join('') + `</div>`;
}

function dist(recipes, keyFn, labelFn) {
  const m = new Map();
  recipes.forEach(it => {
    const ks = keyFn(it);
    (Array.isArray(ks) || ks instanceof Set ? [...ks] : [ks]).filter(k => k != null && k !== '')
      .forEach(k => m.set(k, (m.get(k) || 0) + 1));
  });
  const base = Math.max(1, recipes.length);
  return [...m.entries()].sort((a, b) => b[1] - a[1])
    .map(([k, c]) => ({ key: k, label: labelFn ? labelFn(k) : String(k), count: c, pct: Math.round(c / base * 100) }));
}

// Kuten dist, mutta effFn palauttaa {vals, ai} → riveille myös aiCount
// (montako osumaa on AI-päättelyä eikä suoraa dataa).
function distAI(recipes, effFn) {
  const m = new Map();
  recipes.forEach(it => {
    // ai = yksi lippu kaikille arvoille (method); perVal = arvokohtainen
    // Set ✨-arvoista (lajit: suora seeds-laji + AI:n tunnistamat sekaisin)
    const { vals, ai, perVal } = effFn(it);
    vals.filter(k => k != null && k !== '').forEach(k => {
      const e = m.get(k) || { count: 0, aiCount: 0 };
      e.count++; if (perVal ? perVal.has(k) : ai) e.aiCount++;
      m.set(k, e);
    });
  });
  const base = Math.max(1, recipes.length);
  return [...m.entries()].sort((a, b) => b[1].count - a[1].count)
    .map(([k, e]) => ({ key: k, label: String(k), count: e.count, aiCount: e.aiCount,
                        pct: Math.round(e.count / base * 100) }));
}

function median(arr) {
  const a = arr.filter(x => x != null).sort((x, y) => x - y);
  if (!a.length) return null;
  return a.length % 2 ? a[Math.floor(a.length / 2)] : Math.round((a[a.length / 2 - 1] + a[a.length / 2]) / 2);
}

function chipRow() {

  if (F.ingCat) chip('Aineskategoria: ' + F.ingCat, `drillCat('${F.ingCat.replace(/'/g, "\\'")}')`);
  F.ings.forEach(s => chip('Aines: ' + (ING[s]?.name || s), `drillIng('${s}')`));
  if (F.time != null) chip('Kesto: ' + TIMEBUCKETS[F.time][0], `drillTime('${F.time}')`);

  F.exGroups.forEach(g => chip('Ilman: ' + EX_GROUPS[g].label, `drillExclude('${g}')`));
  if (!chips.length) return '';
  return `<div class="filterbar"><span style="font-size:12.5px;color:var(--muted);font-weight:600">Valittu:</span> ${chips.join(' ')}
    <button class="clearall" onclick="clearAll()">Tyhjennä kaikki</button></div>`;
}

// Haku päivittää vain sisällön (ei koko toolbaria) → syöttökenttä säilyttää fokuksen
window.onSearchInput = v => {
  q = v;
  const set = (id, html) => { const e = document.getElementById(id); if (e) e.innerHTML = html; };
  set('breadcrumbSlot', chipRow());
  set('statSlot', renderStats());
  set('recipeBody', renderBody());
};

const QUICK_METHODS = ['pannu', 'uuni', 'keitto', 'grilli', 'savustus', 'graavi'];

function renderBody() {
  const cur = filtered(null);
  const med = median(cur.map(r => effMinutes(r).v));
  let panel = '';
  if (chartsOpen) {
    const charts = [];
    charts.push(barChart({
    title: 'Kalalajit', sub: aiOn
      ? 'Taso: Kala → laji. Resepti voi kuulua moneen lajiin; ✨-osuus = AI tunnisti lajin sisällöstä.'
      : 'Taso: Kala → laji. Osuus reseptijoukosta.',
    rows: distAI(filtered('species'), it => {
        const e = effSpecies(it);
        // ai-lippu per laji: distAI laskee ✨-osuuden riveittäin alla
        return { vals: e.slugs, ai: false, perVal: e.aiSlugs };
      })
      .map(r => ({ ...r, label: SPEC[r.key]?.name_fi || r.key, selected: F.species === r.key })),
    onclickName: 'drillSpecies' }));

  charts.push(barChart({
    title: 'Valmistustapa', sub: aiOn ? 'Miten reseptit kypsennetään. Raidoitettu ✨-osuus = AI päätellyt sisällöstä.' : 'Miten reseptit kypsennetään.',
    rows: distAI(filtered('method'), effMethods)
      .map(r => ({ ...r, selected: F.method === r.key })),
    onclickName: 'drillMethod' }));

  charts.push(barChart({
    title: 'Ainesosakategoriat', sub: 'Osuus resepteistä, joissa kategorian aineksia. Klikkaus porautuu aineksiin.',
    rows: dist(filtered('ingCat'), recipeCats)
      .map(r => ({ ...r, selected: F.ingCat === r.key })),
    onclickName: 'drillCat' }));

  charts.push(barChart({
    title: 'Lisukkeet', sub: 'Reseptin lisuke-/lisäkekomponentit (aineksista ja otsikosta). Klikkaus rajaa.',
    rows: dist(filtered('side'), it => it.sides || [], k => SIDE_LABEL[k] || k)
      .map(r => ({ ...r, selected: F.side === r.key })),
    onclickName: 'drillSide' }));

  const ingBase = filtered('ings');
  const allIngRows = dist(ingBase, it => it.norm.filter(s => !F.ingCat || ING[s]?.category === F.ingCat),
                          k => ING[k]?.name || k);
  const ingRows = allIngRows.slice(0, 14);
  allIngRows.slice(14).forEach(r => { if (F.ings.includes(r.key)) ingRows.push(r); });
  charts.push(barChart({
    title: F.ingCat ? `Ainesosat: ${F.ingCat}` : 'Käytetyimmät ainesosat',
    sub: 'Osuus resepteistä, joissa aines esiintyy. Monivalinta.',
    rows: ingRows.map(r => ({ ...r, selected: F.ings.includes(r.key) })),
    onclickName: 'drillIng' }));

  charts.push(barChart({
    title: 'Reseptin kesto', sub: aiOn ? 'Kokonaisaika — sivuston ilmoittama; ✨-osuus AI/heuristisesti päätelty.' : 'Kokonaisaika (sivuston ilmoittama).',
    rows: TIMEBUCKETS.map(([lbl, fn], i) => {
      const base = filtered('time');
      const hits = base.map(effMinutes).filter(e => fn(e.v));
      const c = hits.length, aiC = hits.filter(e => e.o && e.o !== 'suora').length;
      return { key: i, label: lbl, count: c, aiCount: aiC, pct: Math.round(c / Math.max(1, base.length) * 100), selected: F.time === i };
    }).filter(r => r.count > 0),
    onclickName: 'drillTime' }));

    charts.push(barChart({
      title: 'Lähdesivustot', sub: 'Mistä reseptit on crawlattu.',
      rows: dist(filtered('site'), it => it.site).slice(0, 12)
        .map(r => ({ ...r, selected: F.site === r.key })),
      onclickName: 'drillSite' }));
    panel = `<div class="chartwrap">${charts.join('')}</div>`;
  }
  return `${panel}<div class="grid">${cur.map(card).join('')}</div>`;
}

function renderStats() {
  const cur = filtered(null);
  const med = median(cur.map(r => effMinutes(r).v));
  const medAI = aiOn && cur.some(r => { const e = effMinutes(r); return e.v != null && e.o !== 'suora'; });
  const total = allRecipes().length;
  return `<div class="statrow">
    <div class="stat"><div class="lbl">Reseptejä valinnassa</div><div class="val">${cur.length}${cur.length < total ? ` <span style="font-size:13px;color:var(--muted);font-weight:400">/ ${total}</span>` : ''}</div></div>
    <div class="stat"><div class="lbl">Lähdesivustoja</div><div class="val">${new Set(cur.map(r => r.site)).size}</div></div>
    <div class="stat"><div class="lbl">Eri ainesosia</div><div class="val">${new Set(cur.flatMap(r => r.norm)).size}</div></div>
    <div class="stat"><div class="lbl">Mediaanikesto${medAI ? ' <span title="Sisältää AI-pääteltyjä kestoja">✨</span>' : ''}</div><div class="val">${med != null ? med + ' min' : '–'}</div></div>
  </div>`;
}

function renderReseptit(el) {
  const pills = QUICK_METHODS.map(m =>
    `<button class="${F.method === m ? 'on' : ''}" onclick="drillMethod('${m}')">${m}</button>`).join('');
  el.innerHTML = `
    <div class="rtoolbar">
      <div class="grow"><input type="search" id="recipeSearch" style="width:100%"
        placeholder="Hae resepteistä (esim. ruisjauho, ruskistettu voi, sitruuna)…"
        value="${esc(q)}" oninput="onSearchInput(this.value)"></div>
      <div class="chips">${pills}</div>
    </div>
    <div class="exrow"><span class="exlabel">🚫 Ilman:</span>${Object.entries(EX_GROUPS).map(([g, gr]) =>
      `<button class="exchip ${F.exGroups.includes(g) ? 'on' : ''}" onclick="drillExclude('${g}')">${esc(gr.label)}</button>`).join('')}
      <button class="exchip aitoggle ${aiOn ? 'on' : ''}" onclick="toggleAI()"
        title="Kun päällä, AI:n sisällöstä päättelemät valmistustavat ja kestot täydentävät puuttuvia tietoja. Päätellyt arvot näkyvät ✨-merkittyinä ja raidoitettuina — suoraan lähteestä tulevaa dataa ei koskaan korvata.">✨ AI-täydennys: ${aiOn ? 'käytössä' : 'pois'}</button></div>
    <div id="breadcrumbSlot">${chipRow()}</div>
    <div id="statSlot">${renderStats()}</div>
    <div id="decisionsSlot">${renderDecisions()}</div>
    <button class="pt-bar ${chartsOpen ? 'open' : ''}" onclick="toggleCharts()" aria-expanded="${chartsOpen}">
      <span class="pt-ico">📊</span>
      <span class="pt-txt"><strong>Suodattimet &amp; jakaumat</strong>
        <span class="pt-sub">${chartsOpen
          ? 'Klikkaa palkkia rajataksesi reseptejä — piilota suodattimet painamalla tästä'
          : 'Avaa ja rajaa reseptejä lajin, valmistustavan, aineksen, keston tai lähteen mukaan'}</span></span>
      <span class="pt-chev">${chartsOpen ? '▲' : '▼'}</span>
    </button>
    <div id="recipeBody">${renderBody()}</div>`;
  const inp = document.getElementById('recipeSearch');
  if (inp && q && document.activeElement !== inp) { inp.focus(); inp.setSelectionRange(q.length, q.length); }
}

// Tooltip-kerros (hover): arvo edellä, nimi perässä; vain textContent-turvallista sisältöä.
const tipEl = document.createElement('div');
tipEl.className = 'viztip'; document.body.appendChild(tipEl);
document.addEventListener('pointermove', e => {
  const t = e.target.closest('[data-tip]');
  if (!t) { tipEl.style.display = 'none'; return; }
  const [label, val, hint] = t.dataset.tip.split('|');
  tipEl.replaceChildren();
  const b = document.createElement('b'); b.textContent = val;
  tipEl.appendChild(b);
  tipEl.appendChild(document.createTextNode(' — ' + label));
  const small = document.createElement('div'); small.textContent = hint; small.style.opacity = .75;
  tipEl.appendChild(small);
  tipEl.style.display = 'block';
  tipEl.style.left = Math.min(e.clientX + 14, innerWidth - 270) + 'px';
  tipEl.style.top = (e.clientY + 16) + 'px';
});
/* ===== "Päätöksesi" — ohjattu decision chain Reseptit-sivulla =====
   Rakentaa samaa F-suodatintilaa kuin jakaumat, mutta askel kerrallaan:
   valitse dimensio → näe vaihtoehdot jakaumapalkkeina → valitse → seuraava.
   Käyttää 20-recipes.js:n koneistoa (filtered/dist/effX/setF/EX_GROUPS…). */
let decisionsOpen = localStorage.getItem('myfood_decisionsOpen') === '1';
let dcStep = null;  // avoinna oleva dimensio (null = "valitse seuraava" -näkymä)

const DC_DIMS = [
  { key: 'species', ico: '🐟', label: 'Mikä kala',
    options: () => dist(filtered('species'), it => effSpecies(it).slugs, s => SPEC[s]?.name_fi || s) },
  { key: 'method', ico: '🔥', label: 'Valmistustapa',
    options: () => dist(filtered('method'), it => effMethods(it).vals, m => m) },
  { key: 'ingCat', ico: '🥗', label: 'Ainesryhmä',
    options: () => dist(filtered('ingCat'), it => recipeCats(it), c => c) },
  { key: 'time', ico: '⏱️', label: 'Valmistusaika',
    options: () => { const rs = filtered('time'); return TIMEBUCKETS
      .map((tb, i) => ({ key: i, label: tb[0], count: rs.filter(it => tb[1](effMinutes(it).v)).length }))
      .filter(r => r.count > 0); } },
];

function dcContainsExcl(it, g) {
  const gr = EX_GROUPS[g];
  return !!((gr.cat && recipeCats(it).has(gr.cat)) || (gr.slugs && it.norm.some(s => gr.slugs.includes(s))));
}
function dcBaseNoEx() {  // reseptit ilman poissulkuja (jotta näkee montako kukin allergia rajaa)
  const save = F.exGroups; F.exGroups = [];
  const r = filtered(); F.exGroups = save; return r;
}
function dcRefresh() { const el = document.getElementById('decisionsSlot'); if (el) el.innerHTML = renderDecisions(); }
window.dcToggle = () => { decisionsOpen = !decisionsOpen; localStorage.setItem('myfood_decisionsOpen', decisionsOpen ? '1' : '0'); dcRefresh(); };
window.dcOpen = dim => { dcStep = dim; decisionsOpen = true; dcRefresh(); };
window.dcChoose = (dim, val) => { dcStep = null; if (dim === 'time') setF('time', Number(val)); else setF(dim, val); };
window.dcUndo = dim => { if (dim === 'time') setF('time', F.time); else setF(dim, F[dim]); };

function dcOptionBars(rows, onclickExpr, activeKey) {
  const max = Math.max(1, ...rows.map(r => r.count));
  return rows.map(r => {
    const on = activeKey !== undefined && String(r.key) === String(activeKey);
    const key = esc(String(r.key)).replace(/'/g, "\\'");
    return `<button class="dc-opt${on ? ' on' : ''}" onclick="${onclickExpr.replace('%KEY%', key)}">
      <span class="dc-opt-lbl">${on ? '✓ ' : ''}${esc(r.label)}</span>
      <span class="dc-opt-bar"><span style="width:${Math.max(3, Math.round(r.count / max * 100))}%"></span></span>
      <span class="dc-opt-cnt">${r.count}</span></button>`;
  }).join('');
}

function renderDecisions() {
  const cur = filtered();
  const total = allRecipes().length;
  const pct = Math.round(cur.length / Math.max(1, total) * 100);

  const chip = (dim, ico, label) => `<button class="dc-madechip" onclick="dcUndo('${dim}')" title="Poista valinta">${ico} ${esc(label)} <b>✕</b></button>`;
  const chain = [];
  if (F.species) chain.push(chip('species', '🐟', SPEC[F.species]?.name_fi || F.species));
  if (F.method) chain.push(chip('method', '🔥', F.method));
  if (F.ingCat) chain.push(chip('ingCat', '🥗', F.ingCat));
  if (F.time != null) chain.push(chip('time', '⏱️', TIMEBUCKETS[F.time][0]));
  F.exGroups.forEach(g => chain.push(`<button class="dc-madechip ex" onclick="drillExclude('${g}')" title="Poista">🚫 ${esc(EX_GROUPS[g].label)} <b>✕</b></button>`));

  let step;
  if (dcStep === 'exGroups') {
    const base = dcBaseNoEx();
    const rows = Object.entries(EX_GROUPS).map(([g, gr]) => ({ key: g, label: gr.label, count: base.filter(it => dcContainsExcl(it, g)).length }));
    const max = Math.max(1, ...rows.map(x => x.count));
    step = `<div class="dc-options"><div class="dc-opt-h"><span>🚫 Allergiat & poissulut — piilota reseptit joissa on:</span><button class="dc-close" onclick="dcOpen(null)">✕</button></div>`
      + rows.map(r => { const on = F.exGroups.includes(r.key);
        return `<button class="dc-opt${on ? ' on' : ''}" onclick="drillExclude('${r.key}')">
          <span class="dc-opt-lbl">${on ? '✓ ' : ''}${esc(r.label)}</span>
          <span class="dc-opt-bar"><span style="width:${Math.max(3, Math.round(r.count / max * 100))}%"></span></span>
          <span class="dc-opt-cnt">${r.count}</span></button>`; }).join('')
      + `<div class="dc-hint">Voit valita useita. Luku = montako reseptiä sisältää kyseisen aineksen.</div></div>`;
  } else if (dcStep) {
    const dim = DC_DIMS.find(d => d.key === dcStep);
    const rows = dim.options();
    step = `<div class="dc-options"><div class="dc-opt-h"><span>${dim.ico} Valitse: ${dim.label}</span><button class="dc-close" onclick="dcOpen(null)">✕</button></div>`
      + (rows.length ? dcOptionBars(rows, `dcChoose('${dim.key}','%KEY%')`) : '<div class="dc-hint">Ei vaihtoehtoja nykyisillä valinnoilla.</div>')
      + `</div>`;
  } else {
    const dims = DC_DIMS.filter(d => F[d.key] == null).map(d =>
      `<button class="dc-dim" onclick="dcOpen('${d.key}')"><span class="dc-dim-ico">${d.ico}</span><span class="dc-dim-lbl">${d.label}</span><span class="dc-dim-n">${d.options().length} vaihtoehtoa →</span></button>`);
    dims.push(`<button class="dc-dim dc-dim-ex${F.exGroups.length ? ' has' : ''}" onclick="dcOpen('exGroups')"><span class="dc-dim-ico">🚫</span><span class="dc-dim-lbl">Allergiat & poissulut</span><span class="dc-dim-n">${F.exGroups.length ? F.exGroups.length + ' valittu →' : 'valinnainen →'}</span></button>`);
    step = `<div class="dc-step-h">${chain.length ? 'Tee seuraava päätös' : 'Aloita mistä haluat — tee ensimmäinen päätös'}:</div><div class="dc-dims">${dims.join('')}</div>`;
  }

  const body = decisionsOpen ? `<div class="dc-body">
      <div class="dc-remaining">
        <div class="dc-remnum"><b>${cur.length}</b> reseptiä jäljellä <span class="meta">/ ${total}</span></div>
        <div class="dc-rembar"><span style="width:${pct}%"></span></div>
        ${chain.length ? `<button class="dc-reset" onclick="clearF()">Aloita alusta</button>` : ''}
      </div>
      ${chain.length ? `<div class="dc-chain">${chain.join('')}</div>` : `<div class="dc-empty">Et ole vielä tehnyt valintoja. Valitse esim. ensin kala, sitten valmistustapa — tai laita allergiat ensin.</div>`}
      ${step}
    </div>` : '';

  return `<button class="pt-bar dc-bar ${decisionsOpen ? 'open' : ''}" onclick="dcToggle()" aria-expanded="${decisionsOpen}">
      <span class="pt-ico">🧭</span>
      <span class="pt-txt"><strong>Päätöksesi</strong><span class="pt-sub">${decisionsOpen ? 'Rakenna valintasi askel kerrallaan — näet heti montako reseptiä jää' : 'Ohjattu valinta: kala, valmistustapa, aika, allergiat… askel kerrallaan'}</span></span>
      <span class="pt-chev">${decisionsOpen ? '▲' : '▼'}</span>
    </button>${body}`;
}
/* Kalan valmistelu -sivu: dynaamiset suodattimet (laji × tyyppi × aihe × haku).
   Lajitulkinta samalla effSpecies()-funktiolla kuin muuallakin (lajiontologia),
   ja suodatinmäärät lasketaan ristiin kuten Reseptit-sivun jakaumissa: kunkin
   ulottuvuuden luvut näyttävät osumat MUIDEN valittujen suodattimien sisällä.
   Syvälinkki: #kasittely?laji=ahven&tyyppi=video&aihe=fileointi&q=... */
let kasittelyLaji = null, kasittelyTyyppi = null, kasittelyAihe = null, kasittelyQ = '';

// Aiheet tunnistetaan otsikosta+kuvauksesta sanavartaloilla (vrt. normalize.py STEMS)
const KAS_AIHEET = [
  ['fileointi', 'Fileointi', /fileo/i],
  ['perkaus', 'Perkaus', /perkaa|perkuu|suolist|sisälmy/i],
  ['suomustus', 'Suomustus', /suomust/i],
  ['nylkeminen', 'Nylkeminen', /nylke|nylje|nahan\s*poist|nahanpoist/i],
  ['ruodot', 'Ruodot', /ruoto|ruodot|ruodottom/i],
  ['mati', 'Mäti', /mäti|mätiä|mädin/i],
  ['savustus', 'Savustus', /savust/i],
  ['graavaus', 'Graavaus', /graav/i],
  ['sailonta', 'Säilöntä', /säilö|etikka|suolau|purkit/i],
];
const kasText = i => ((i.title || '') + ' ' + (i.description || '')).toLowerCase();
const kasAiheet = i => KAS_AIHEET.filter(([, , re]) => re.test(kasText(i))).map(([k]) => k);

window.goKasittely = slug => {
  kasittelyLaji = slug || null;
  tab = 'kasittely';
  kasHash(); render(); scrollTo(0, 0);
};
window.kasSetLaji = s => { kasittelyLaji = (kasittelyLaji === s) ? null : s; kasHash(); render(); };
window.kasSetTyyppi = t => { kasittelyTyyppi = (kasittelyTyyppi === t) ? null : t; kasHash(); render(); };
window.kasSetAihe = a => { kasittelyAihe = (kasittelyAihe === a) ? null : a; kasHash(); render(); };
window.kasSetQ = v => { kasittelyQ = v; kasHash(); renderKasBody(); };
window.kasClear = () => { kasittelyLaji = kasittelyTyyppi = kasittelyAihe = null; kasittelyQ = ''; kasHash(); render(); };
function kasHash() {
  const p = new URLSearchParams();
  if (kasittelyLaji) p.set('laji', kasittelyLaji);
  if (kasittelyTyyppi) p.set('tyyppi', kasittelyTyyppi);
  if (kasittelyAihe) p.set('aihe', kasittelyAihe);
  if (kasittelyQ) p.set('q', kasittelyQ);
  const qs = p.toString();
  try { history.replaceState(null, '', '#kasittely' + (qs ? '?' + qs : '')); } catch (e) {}
}

// skip = ulottuvuus jonka omat luvut lasketaan muiden suodattimien sisällä
function kasPasses(i, skip) {
  if (i.type !== 'guide' && i.type !== 'video') return false;
  if (skip !== 'laji' && kasittelyLaji && !effSpecies(i).slugs.includes(kasittelyLaji)) return false;
  if (skip !== 'tyyppi' && kasittelyTyyppi && i.type !== kasittelyTyyppi) return false;
  if (skip !== 'aihe' && kasittelyAihe && !kasAiheet(i).includes(kasittelyAihe)) return false;
  if (kasittelyQ && !kasittelyQ.toLowerCase().split(/\s+/).every(w => kasText(i).includes(w))) return false;
  return true;
}
const kasFiltered = skip => D.items.filter(i => kasPasses(i, skip));

function renderKasBody() {
  const el = document.getElementById('kasBody');
  if (!el) return;
  const cur = kasFiltered(null);
  const guides = cur.filter(i => i.type === 'guide');
  const videos = cur.filter(i => i.type === 'video');
  el.innerHTML = `
    ${kasittelyTyyppi !== 'video' ? `<h2>🔪 Perkaus- ja fileointiohjeet (${guides.length})</h2>
      ${guides.length ? `<div class="grid">${guides.map(card).join('')}</div>` : '<p class="meta">Ei ohjeita tällä rajauksella.</p>'}` : ''}
    ${kasittelyTyyppi !== 'guide' ? `<h2 style="margin-top:34px">🎬 Videot (${videos.length})</h2>
      ${videos.length ? `<div class="grid">${videos.map(card).join('')}</div>` : '<p class="meta">Ei videoita tällä rajauksella.</p>'}` : ''}`;
}

function renderKasittely(el) {
  // syvälinkki #kasittely?laji=x&tyyppi=y&aihe=z&q=… toimii suoraan URL:sta
  const qs = location.hash.split('?')[1];
  if (qs) {
    const p = new URLSearchParams(qs);
    if (p.has('laji')) kasittelyLaji = p.get('laji') || null;
    if (p.has('tyyppi')) kasittelyTyyppi = p.get('tyyppi') || null;
    if (p.has('aihe')) kasittelyAihe = p.get('aihe') || null;
    if (p.has('q')) kasittelyQ = p.get('q') || '';
  }
  // Lajichipit: vain lajit joilla on sisältöä (muut suodattimet huomioiden),
  // järjestys määrän mukaan — sama ontologia kuin Järvikalat-korteissa
  const lajiCounts = new Map();
  kasFiltered('laji').forEach(i => effSpecies(i).slugs.forEach(s => {
    if (s !== 'sekakala' && s !== 'yleinen') lajiCounts.set(s, (lajiCounts.get(s) || 0) + 1);
  }));
  const lajiChips = [...lajiCounts.entries()].sort((a, b) => b[1] - a[1])
    .map(([s, n]) => `<button class="exchip ${kasittelyLaji === s ? 'on' : ''}" onclick="kasSetLaji('${s}')">${esc(SPEC[s]?.name_fi || s)} <span class="meta">${n}</span></button>`).join('');
  const base = kasFiltered('tyyppi');
  const nG = base.filter(i => i.type === 'guide').length, nV = base.filter(i => i.type === 'video').length;
  const aiheBase = kasFiltered('aihe');
  const aiheChips = KAS_AIHEET.map(([k, label]) => {
    const n = aiheBase.filter(i => kasAiheet(i).includes(k)).length;
    return n ? `<button class="exchip ${kasittelyAihe === k ? 'on' : ''}" onclick="kasSetAihe('${k}')">${label} <span class="meta">${n}</span></button>` : '';
  }).join('');
  const anyF = kasittelyLaji || kasittelyTyyppi || kasittelyAihe || kasittelyQ;
  el.innerHTML = `
    <div class="rtoolbar">
      <div class="grow"><input type="search" id="kasSearch" style="width:100%"
        placeholder="Hae ohjeista ja videoista (esim. fileointi, nylkeminen, mäti)…"
        value="${esc(kasittelyQ)}" oninput="kasSetQ(this.value)"></div>
      <div class="chips">
        <button class="${kasittelyTyyppi === 'guide' ? 'on' : ''}" onclick="kasSetTyyppi('guide')">🔪 Ohjeet ${nG}</button>
        <button class="${kasittelyTyyppi === 'video' ? 'on' : ''}" onclick="kasSetTyyppi('video')">🎬 Videot ${nV}</button>
      </div>
    </div>

function mdToHtml(md, refPrefix = 'wf') {
  let h = esc(md);
  h = h.replace(/\[\[([\d,\s]+)\]\]/g, (mm, nums) => '<sup class="cref-sup">[' + nums.split(',').map(x => x.trim()).filter(Boolean).map(n => '<a class="cref" onclick="citShow(\'' + refPrefix + '-' + n + '\')">' + n + '</a>').join(',') + ']</sup>');
  // taulukot
  h = h.replace(/((?:^\|.*\|\s*$\n?)+)/gm, block => {
    const rows = block.trim().split('\n').map(r => r.replace(/^\||\|$/g, '').split('|').map(c => c.trim()));
    if (rows.length < 2) return block;
    const body = rows.filter(r => !r.every(c => /^-+$/.test(c)));
    const [head, ...rest] = body;
    return '<table><tr>' + head.map(c => `<th>${c}</th>`).join('') + '</tr>' +
      rest.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('') + '</table>';
  });
  h = h.replace(/^### (.*)$/gm, '<h3>$1</h3>')
       .replace(/^## (.*)$/gm, '<h2>$1</h2>')
       .replace(/^# (.*)$/gm, '<h1>$1</h1>')
       .replace(/^(\d+)\. (.*)$/gm, '<oli data-n="$1">$2</oli>')
       .replace(/^- (.*)$/gm, '<uli>$1</uli>')
       .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
       .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Inline-lähdeviitteet: [[12]] tai [[12, 13, 14]] → klikattava yläindeksi (avaa citShow('wf-N'))
  h = h.replace(/\[\[\s*([\d\s,]+?)\s*\]\]/g, (m, g) => {
    const links = g.split(',').map(x => x.trim()).filter(Boolean).map(n => {
      const s = (typeof SOURCES !== 'undefined') ? SOURCES[refPrefix + '-' + n] : null;
      const tt = s ? esc(s.label) : '';
      return `<a class="cref" onclick="citShow('${refPrefix}-${n}');return false;" title="${tt}">${n}</a>`;
    }).join('<span class="ref-sep">,</span>');
    return links ? `<sup class="ref">${links}</sup>` : m;
  });
  h = h.replace(/(?:<uli>.*?<\/uli>\n?)+/gs, b => '<ul>' + b.replace(/<\/?uli>/g, m => m.includes('/') ? '</li>' : '<li>') + '</ul>');
  h = h.replace(/(?:<oli[^>]*>.*?<\/oli>\n?)+/gs, b => '<ol>' + b.replace(/<oli data-n="(\d+)">/g, '<li data-n="$1">').replace(/<\/oli>/g, '</li>') + '</ol>');
  return h.split(/\n{2,}/).map(p => /^<(h\d|ul|ol|table)/.test(p.trim()) ? p : `<p>${p}</p>`).join('\n');
}

function analysisMeta(a) {
  const title = a.body_md.split('\n')[0].replace(/^#\s*/, '').trim();
  const label = title.split('—')[0].trim() || title;
  const headings = (a.body_md.match(/^##\s+.*/gm) || []).map(h => h.replace(/^##\s+/, '').trim());
  const nm = title.match(/synteesi\s+(\d+)/i);
  const recipeN = nm ? +nm[1] : null;
  // hook = ensimmäinen varsinainen leipätekstikappale (ohita otsikot, kursiivi-intro, taulukot)
  let hook = '';
  for (const p of a.body_md.split(/\n\s*\n/).slice(1)) {
    const t = p.trim();
    if (t && !t.startsWith('#') && !t.startsWith('*') && !t.startsWith('|') && !t.startsWith('-')) {
      hook = t.replace(/\n/g, ' ').replace(/[*_`#\[\]]/g, ''); break;
    }
  }
  return { a, title, label, headings, hook, recipeN };
}

function analysisTopicRecipes(a) {
  const sl = a.species_slug || '', tp = (a.topic || '') + ' ' + (a.id || '');
  const wantKeitto = /keitto/i.test(tp), wantSavu = /savust/i.test(tp);
  return D.items.filter(i => i.type === 'recipe' && (
    i.species_slug === sl ||
    (wantKeitto && /keitto/i.test(i.method || '')) ||
    (wantSavu && /savust/i.test(i.method || ''))));
}
function analysisImages(a, n) {
  const seen = new Set(), out = [];
  for (const r of analysisTopicRecipes(a)) {
    if (!r.image_file || seen.has(r.image_file)) continue;
    seen.add(r.image_file);
    out.push({ src: CRAWLER + r.image_file, title: r.title || '', site: r.site || '', id: r.id });
    if (out.length >= n) break;
  }
  return out;
}
function analysisMethodDist(a) {
  const c = {};
  analysisTopicRecipes(a).forEach(r => (r.method || 'muu').split('+').forEach(mm => {
    mm = mm.trim(); if (mm && mm !== 'kasittely') c[mm] = (c[mm] || 0) + 1;
  }));
  return Object.entries(c).sort((x, y) => y[1] - x[1]).slice(0, 6);
}

/* Järvikalat käyttää samaa lajiontologiaa (species-taulu) ja samaa
   effSpecies()-tulkintaa kuin Reseptit-sivun suodattimet ja jakaumat —
   sama resepti kuuluu samoihin lajeihin kaikkialla sovelluksessa.
   ✨-osuus = AI tunnisti lajin reseptin sisällöstä (recipe_species). */
function speciesRecipes(slug) {
  const direct = [], ai = [];
  for (const i of D.items) {
    if (i.type !== 'recipe') continue;
    const e = effSpecies(i);
    if (!e.slugs.includes(slug)) continue;
    (e.aiSlugs.has(slug) ? ai : direct).push(i);
  }
  return { direct, ai, total: direct.length + ai.length };
}

function qaFlat() { return QA.flatMap(g => g.items.map(it => ({ ...it, cat: g.cat }))); }
function renderQaBody() {
  const words = qaQ.toLowerCase().split(/\s+/).filter(Boolean);
  const match = it => !words.length || words.every(w => (it.q + ' ' + it.a + ' ' + it.cat).toLowerCase().includes(w));
  const groups = QA.map(g => {
    const items = g.items.filter(match);
    if (!items.length) return '';
    const rows = items.map(it => `
      <details class="qa-item">
        <summary>${esc(it.q)}</summary>
        <div class="qa-ans">${it.a}${it.ex ? `<div class="qa-ex"><button class="qa-exbtn" onclick="applyRecipeFilter('${esc(it.ex[1])}')">${esc(it.ex[0])}</button></div>` : ''}</div>
      </details>`).join('');
    return `<div class="qa-group"><h3>${esc(g.cat)}</h3>${rows}</div>`;
  }).join('');
  return groups || '<p class="meta">Ei osumia haulla. Kokeile toista hakusanaa.</p>';
}

window.setSrcMode = m => { lahteetMode = m; render(); };

window.onSrcSearch = v => { srcQ = v; const b = document.getElementById('srcBody'); if (b) b.innerHTML = renderSrcBody(); };

function srcFiltered() {
  return Object.values(SOURCES).filter(s => {
    if (srcType !== 'kaikki' && s.kind !== srcType) return false;
    if (srcQ) { const h = (s.label + ' ' + s.publisher + ' ' + (s.theme || '') + ' ' + (s.cited || '')).toLowerCase();
      if (!srcQ.toLowerCase().split(/\s+/).every(w => h.includes(w))) return false; }
    return true;
  });
}

function renderSrcBody() {
  const list = srcFiltered();
  const groupKey = s => srcGroup === 'tyyppi' ? (KIND_LABEL[s.kind] || s.kind)
    : srcGroup === 'aihe' ? (s.theme || (s.species ? (SPEC[s.species]?.name_fi || s.species) : '— muu —'))
    : s.publisher;
  const groups = {};
  list.forEach(s => { const k = groupKey(s); (groups[k] = groups[k] || []).push(s); });
  const gkeys = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length || a.localeCompare(b));
  const kindBadge = k => `<span class="badge ${k === 'resepti' ? 'pannu' : k === 'opas' ? 'guide' : k === 'video' ? 'video' : k === 'viite' ? 'keitto' : 'uuni'}">${esc(KIND_LABEL[k] || k)}</span>`;

    return `<details class="fish-details wf-theme">
      <summary>${esc(k)} <span class="wf-count">${groups[k].length}</span></summary>
      <ul class="srclist">${rows}</ul></details>`;
  }).join('');
  const types = [['kaikki', 'Kaikki'], ['resepti', 'Reseptit'], ['opas', 'Ohjeet'], ['video', 'Videot'], ['viite', 'Viitelähteet'], ['lajitieto', 'Lajitieto']];

  return `

      return `<button class="${srcType === k ? 'on' : ''}" onclick="setSrcType('${k}')">${l} <span class="wf-count">${n}</span></button>`;
    }).join('')}</div>
    <div class="statrow">

  return `<td title="${esc(String(v).slice(0, 400))}">${esc(String(v).slice(0, 200))}</td>`;
}
function renderDbBody() {
  const el = document.getElementById('dbBody');

  const cols = dbVisibleCols();
  const rows = dbFilteredRows();
  const total = window.MYFOOD_DB.tables[dbTable].rows.length;
  el.innerHTML = `
    <p class="meta">${rows.length === total ? `${total} riviä` : `${rows.length} / ${total} riviä`}${dbSort ? ` · järjestetty: ${esc(dbSort)} ${dbDir > 0 ? '▲' : '▼'}` : ''} · klikkaa riviä nähdäksesi koko tietueen</p>

      idx.push({ cat: 'Oivallukset & synteesit', title: a.title, text: strip(a.body_md), go });
    });
    (((D.cultures || {}).regions) || []).forEach(rg => idx.push({ cat: 'Kulttuurit', title: rg.emoji + ' ' + rg.name, text: strip([rg.name, rg.blurb, (rg.insights || []).join(' '), (rg.dishes || []).map(x => x.name + ' ' + x.desc).join(' ')].join(' ')), go: () => gotoCulture(rg.key) }));
    Object.values(SOURCES).forEach(s => { if (s.kind === 'viite') idx.push({ cat: 'Viitelähteet', title: s.label, text: strip([s.label, s.publisher, s.theme, s.cited].join(' ')), go: () => citShow(s.id) }); });
    if (typeof QA !== 'undefined') QA.forEach(g => g.items.forEach(it => idx.push({ cat: 'Q&A', title: strip(it.q), text: strip(it.q + ' ' + it.a), go: () => { goTab('ohjeet'); setTimeout(() => { const i = document.querySelector('#main input[oninput*="onQaSearch"]'); if (i) { i.value = hsQ; onQaSearch(hsQ); } }, 60); } })));
    if (typeof ABBR !== 'undefined') ABBR.forEach(e => idx.push({ cat: 'Lyhenteet', title: e.term + ' — ' + e.full, text: strip(e.term + ' ' + e.full + ' ' + e.def), go: () => glossShow(e.term) }));
    idxCache = idx;
    return idx;
  }

  function snippet(text, q) {
    const i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return '';
    const a = Math.max(0, i - 55), b = Math.min(text.length, i + q.length + 75);
    let s = (a > 0 ? '…' : '') + text.slice(a, b) + (b < text.length ? '…' : '');
    return esc(s).replace(new RegExp('(' + reEsc(esc(q)) + ')', 'gi'), '<mark>$1</mark>');
  }

  function searchSite(q) {
    const hits = [];
    buildIndex().forEach(e => { const n = countOcc(e.text, q); if (n) hits.push({ ...e, n }); });
    hits.sort((a, b) => b.n - a.n);
    const CATS = ['Reseptit', 'Kulttuurit', 'Järvikalat', 'Oivallukset & synteesit', 'Viitelähteet', 'Käsittelyohjeet', 'Videot', 'Q&A', 'Lyhenteet'];
    let html = `<div class="hs-count">${hits.length} osumaa · ”${esc(q)}” <span class="spacer"></span><button onclick="hsClose()">Sulje ✕</button></div>`;
    if (!hits.length) html += `<div class="hs-hint">Ei osumia koko sivustolta. Kokeile toista hakusanaa tai sanan alkuosaa (esim. ”graavi”).</div>`;
    const ordered = []; let gi = 0;
    CATS.forEach(cat => {
      const grp = hits.filter(h => h.cat === cat);
      if (!grp.length) return;
      html += `<div class="hs-cat">${cat} · ${grp.length}</div>`;
      grp.slice(0, 8).forEach(h => {
        ordered.push(h);
        html += `<div class="hs-item" onclick="hsGo(${gi})"><div class="hs-item-title">${esc(h.title)}<span class="hs-item-count">${h.n}</span></div><div class="hs-item-snip">${snippet(h.text, q)}</div></div>`;
        gi++;
      });
      if (grp.length > 8) html += `<div class="hs-hint">…ja ${grp.length - 8} muuta osumaa tässä ryhmässä — tarkenna hakua.</div>`;
    });
    window._hsOrdered = ordered;
    openPanel(html);
  }
  window.hsGo = i => { const h = (window._hsOrdered || [])[i]; if (!h) return; hsClose(); h.go(); };

  function clearMarks() {
    marks.forEach(m => { const p = m.parentNode; if (p) { p.replaceChild(document.createTextNode(m.textContent), m); p.normalize(); } });
    marks = []; curMark = -1;
  }
  function searchPage(q) {
    clearMarks();
    const root = document.getElementById('main');
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: n => (n.parentElement && !/^(SCRIPT|STYLE|MARK)$/.test(n.parentElement.tagName) && n.textContent.toLowerCase().includes(q.toLowerCase())) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT });
    const nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node => {
      const parts = node.textContent.split(new RegExp('(' + reEsc(q) + ')', 'gi'));
      if (parts.length < 2) return;
      const frag = document.createDocumentFragment();
      parts.forEach(p => {
        if (p.toLowerCase() === q.toLowerCase()) { const m = document.createElement('mark'); m.className = 'hs-mark'; m.textContent = p; frag.appendChild(m); marks.push(m); }
        else if (p) frag.appendChild(document.createTextNode(p));
      });
      node.parentNode.replaceChild(frag, node);
    });
    openPanel(`<div class="hs-count">${marks.length} osumaa tällä sivulla · ”${esc(q)}”
      <span class="spacer"></span>
      <button onclick="hsJump(-1)" title="Edellinen osuma">⬆</button>
      <button onclick="hsJump(1)" title="Seuraava osuma">⬇</button>
      <button onclick="hsClose()">Tyhjennä ✕</button></div>
      ${marks.length ? '' : '<div class="hs-hint">Ei osumia tällä sivulla — vaihda ”Koko sivusto” hakeaksesi kaikkialta.</div>'}`);
    if (marks.length) hsJump(1);
  }
  window.hsJump = dir => {
    if (!marks.length) return;
    if (curMark >= 0) marks[curMark].classList.remove('hs-cur');
    curMark = (curMark + dir + marks.length) % marks.length;
    marks[curMark].classList.add('hs-cur');
    marks[curMark].scrollIntoView({ block: 'center', behavior: 'smooth' });
    const c = document.querySelector('#hsPanel .hs-count');
    if (c) c.firstChild.textContent = `${curMark + 1}/${marks.length} osumaa tällä sivulla · ”${hsQ}” `;
  };

  function openPanel(html) {
    const p = $('hsPanel'), box = $('siteSearch');
    p.innerHTML = html;
    const r = box.getBoundingClientRect();
    p.style.top = Math.round(r.bottom + 10) + 'px';
    p.classList.add('open');
  }
  window.hsClose = () => { const p = $('hsPanel'); if (p) p.classList.remove('open'); clearMarks(); };

  window.onSiteSearch = v => {
    hsQ = v.trim();
    if (hsQ.length < 2) { hsClose(); return; }
    scope === 'site' ? searchSite(hsQ) : searchPage(hsQ);
  };
  window.setSearchScope = s => {
    scope = s;
    $('hsScopeSite').classList.toggle('on', s === 'site');
    $('hsScopePage').classList.toggle('on', s === 'page');
    if (s === 'site') clearMarks();
    if (hsQ.length >= 2) onSiteSearch(hsQ); else $('siteSearch').focus();
  };
  window.hsKeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); scope === 'page' ? hsJump(1) : hsGo(0); }
    if (e.key === 'Escape') { $('siteSearch').blur(); hsClose(); }
  };

  document.addEventListener('DOMContentLoaded', () => {
    const header = document.querySelector('header');
    if (!header || $('hdrSearch')) return;
    const wrap = document.createElement('div');
    wrap.className = 'hdr-search'; wrap.id = 'hdrSearch';
    wrap.innerHTML = `
      <div class="hs-box"><span class="hs-ic">🔍</span>
        <input id="siteSearch" type="text" autocomplete="off" placeholder="Hae… (Ctrl+K)" aria-label="Hae sivustolta"
               oninput="onSiteSearch(this.value)" onkeydown="hsKeydown(event)"></div>
      <div class="hs-scope" role="group" aria-label="Hakualue">
        <button id="hsScopeSite" class="on" onclick="setSearchScope('site')" title="Hae koko sivustolta">Koko sivusto</button>
        <button id="hsScopePage" onclick="setSearchScope('page')" title="Hae vain tältä sivulta">Tämä sivu</button>
      </div>`;
    header.appendChild(wrap);
    const panel = document.createElement('div');
    panel.className = 'hs-panel'; panel.id = 'hsPanel';
    document.body.appendChild(panel);
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); $('siteSearch').focus(); $('siteSearch').select(); }
    });
    document.addEventListener('click', e => {
      const p = $('hsPanel');
      if (p.classList.contains('open') && !p.contains(e.target) && !wrap.contains(e.target)) p.classList.remove('open');
    });
  });
})();
/* ===================== MYPUBLICANALYTICS =====================
   Kävijäanalytiikka MyPublicAnalytics-infralla (Cloudflare Worker + D1).
   Site-tägi: MyFishFood. Beacon + auto-instrument ovat kopioita kanonisesta
   lähteestä ClaudeCode/MyPublicAnalytics/beacon/ — älä muokkaa täällä, vaan
   päivitä sinne ja kopioi uudelleen. Oman käytön erottelu: ?_mypa_self=1 */
window.__MYPA_SITE__ = 'MyFishFood';
window.__MYPA_ENDPOINT__ = 'https://mypa.longshoreforrest.workers.dev/collect';

/* ---- beacon/analytics.js (kopio) ---- */
/*!
 * MyPublicAnalytics beacon — selainpuolen snippet.
 *
 * Lähetys:
 *   - 'pageview' automaattisesti sivun latautuessa
 *   - Custom-eventit: window.mypa.send('section_view', { section: 'experience' })
 *
 * Käyttää navigator.sendBeacon() (eloonjäänti sivu-vaihdoksen yli) ja
 * fetch keepalive:n fallbackia.
 *
 * Self-tagging (oman vierailusi erottelu):
 *   Käy kerran sivulla URL:lla ?_mypa_self=1 → localStorageen tallentuu lippu,
 *   ja kaikki tulevat eventit lähetetään {self:true}. Pois: ?_mypa_self=0.
 */
(function () {
  if (typeof window === "undefined") return;
  if (window.mypa && window.mypa.__initialized) return;

  var SITE = window.__MYPA_SITE__ || "unknown";
  var ENDPOINT = window.__MYPA_ENDPOINT__ || "";
  var AUTO_EVENT = window.__MYPA_AUTO_EVENT__ || "pageview";

  if (!ENDPOINT) return;

  // Self-marker: URL-parametri tai localStorage-lippu.
  var SELF = false;
  try {
    var sp = new URLSearchParams(window.location.search);
    if (sp.get("_mypa_self") === "1") {
      try { localStorage.setItem("mypa_self", "1"); } catch (e) {}
    } else if (sp.get("_mypa_self") === "0") {
      try { localStorage.removeItem("mypa_self"); } catch (e) {}
    }
    try { SELF = localStorage.getItem("mypa_self") === "1"; } catch (e) {}
  } catch (e) {}

  function utm() {
    try {
      var p = new URLSearchParams(window.location.search);
      return {
        source: p.get("utm_source") || null,
        medium: p.get("utm_medium") || null,
        campaign: p.get("utm_campaign") || null,
      };
    } catch (e) {
      return { source: null, medium: null, campaign: null };
    }
  }

  // Käyttäjäidentiteetti (esim. Google Sign-In) jaetusta localStoragesta.
  // Kirjoitettu muotoon { email, name, sub, idToken, t }. Worker varmentaa
  // idTokenin RS256/JWKS:llä; user-kenttä on varauloskäynti (varmentamaton).
  var IDENTITY_KEY = window.__MYPA_IDENTITY_KEY__ || "unitas:identity";
  function identity() {
    try {
      var raw = localStorage.getItem(IDENTITY_KEY);
      if (!raw) return null;
      var o = JSON.parse(raw);
      if (!o || !o.email) return null;
      return o;
    } catch (e) {
      return null;
    }
  }

  function clientContext() {
    var ctx = {};
    try {
      ctx.screen_w = window.screen && screen.width || null;
      ctx.screen_h = window.screen && screen.height || null;
      ctx.viewport_w = window.innerWidth || null;
      ctx.viewport_h = window.innerHeight || null;
      ctx.dpr = window.devicePixelRatio || null;
      ctx.language = (navigator.language || "").slice(0, 16);
      ctx.languages = Array.isArray(navigator.languages)
        ? navigator.languages.slice(0, 4).join(",")
        : null;
      ctx.color_scheme =
        (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches)
          ? "dark" : "light";
      ctx.tz =
        (Intl && Intl.DateTimeFormat &&
         new Intl.DateTimeFormat().resolvedOptions().timeZone) || null;
      ctx.tz_offset = -new Date().getTimezoneOffset();
      var c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (c) {
        ctx.net_type = c.effectiveType || null;
        ctx.net_downlink = c.downlink || null;
        ctx.net_rtt = c.rtt || null;
        ctx.net_save_data = !!c.saveData;
      }
      ctx.touch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
      ctx.hardware_concurrency = navigator.hardwareConcurrency || null;
      ctx.device_memory = navigator.deviceMemory || null;
    } catch (e) {}
    return ctx;
  }

  function send(event, extra) {
    try {
      // Liitä client-konteksti pageview-eventtiin (kerran per session).
      var ev = event || "pageview";
      var enriched = extra ? Object.assign({}, extra) : {};
      if (ev === "pageview" || ev === "login_pageview") {
        Object.assign(enriched, clientContext());
      }
      var id = identity();
      var body = JSON.stringify({
        site: SITE,
        path: window.location.pathname + window.location.search,
        event: ev,
        referrer: document.referrer || "",
        utm: utm(),
        extra: Object.keys(enriched).length ? enriched : null,
        self: SELF || undefined,
        user: id ? { email: id.email, name: id.name, sub: id.sub } : undefined,
        idToken: id && id.idToken ? id.idToken : undefined,
      });
      if (
        navigator.sendBeacon &&
        navigator.sendBeacon(
          ENDPOINT,
          new Blob([body], { type: "text/plain;charset=UTF-8" }),
        )
      ) {
        return;
      }
      fetch(ENDPOINT, {
        method: "POST",
        headers: { "content-type": "text/plain;charset=UTF-8" },
        body: body,
        keepalive: true,
        mode: "cors",
        credentials: "omit",
      }).catch(function () {});
    } catch (e) {}
  }

  if (document.readyState === "complete" || document.readyState === "interactive") {
    send(AUTO_EVENT);
  } else {
    document.addEventListener("DOMContentLoaded", function () {
      send(AUTO_EVENT);
    });
  }

  window.mypa = { send: send, __initialized: true, __self: SELF };
})();

/* ---- beacon/auto-instrument.js (kopio) ---- */
/*!
 * MyPublicAnalytics auto-instrument — generic behavioral tracking companion.
 *
 * Load this AFTER beacon/analytics.js. The beacon sends the automatic
 * 'pageview'; this adds the richer behavioral events the dashboard already
 * understands, WITHOUT any site-specific code:
 *
 *   - section_view   once per `section[id]` (or [data-section]) scrolled into view
 *   - nav_jump       clicks on same-origin page navigation (*.html links)
 *   - click          outbound links, mailto/tel, and PDF opens
 *   - engagement_end visible time + total time + max scroll % + sections seen,
 *                    sent on tab-hide / page-exit (checkpoint-safe)
 *
 * It is a no-op if the beacon (window.mypa) is not present, and never throws.
 * CV does its own bespoke instrumentation in script.js, so it does NOT load
 * this file — this is for sites (PhD, future) that just want sensible defaults.
 *
 * Optional config (set before this script runs):
 *   window.__MYPA_AUTO__ = { sections: true, nav: true, clicks: true, engagement: true };
 */
(function () {
  if (typeof window === "undefined" || typeof document === "undefined") return;
  if (window.__mypaAutoInit) return;
  window.__mypaAutoInit = true;

  var CFG = window.__MYPA_AUTO__ || {};
  var DO_SECTIONS    = CFG.sections    !== false;
  var DO_NAV         = CFG.nav         !== false;
  var DO_CLICKS      = CFG.clicks      !== false;
  var DO_ENGAGEMENT  = CFG.engagement  !== false;
  var PAGE = window.__MYPA_PAGE__ || null;

  function send(event, extra) {
    try {
      if (window.mypa && window.mypa.send) {
        var e = extra || {};
        if (PAGE && e.page == null) e.page = PAGE;
        window.mypa.send(event, e);
      }
    } catch (err) { /* never break the page */ }
  }

  // ── section_view ───────────────────────────────────────────────────────────
  var sentSections = {};
  var seenCount = 0;
  function observeSections() {
    if (!DO_SECTIONS || typeof IntersectionObserver === "undefined") return;
    var nodes = document.querySelectorAll(
      "section[id], [data-section], article[id], h2[id], h3[id]"
    );
    if (!nodes.length) return;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        var t = entry.target;
        var id = t.getAttribute("data-section") || t.id;
        if (!id || sentSections[id]) return;
        sentSections[id] = true;
        seenCount++;
        send("section_view", { section: String(id).slice(0, 80) });
      });
    }, { threshold: 0.25 });
    nodes.forEach(function (n) { io.observe(n); });
  }

  // ── nav_jump + click (outbound / pdf / contact) ─────────────────────────────
  function onClick(e) {
    try {
      var a = e.target && e.target.closest && e.target.closest("a[href]");
      if (!a) return;
      var href = a.getAttribute("href") || "";
      if (!href || href.charAt(0) === "#") return;            // in-page anchor
      var label = (a.textContent || "").trim().slice(0, 80);

      if (href.indexOf("mailto:") === 0) {
        if (DO_CLICKS) send("click", { target: "email", href: href.slice(0, 160) });
        return;
      }
      if (href.indexOf("tel:") === 0) {
        if (DO_CLICKS) send("click", { target: "phone", href: href.slice(0, 160) });
        return;
      }

      // Resolve to compare origins reliably.
      var url = null;
      try { url = new URL(href, window.location.href); } catch (e2) {}
      var external = url && url.origin !== window.location.origin;

      if (/\.pdf($|[?#])/i.test(href)) {
        if (DO_CLICKS) send("click", { target: "pdf", label: label, href: href.slice(0, 160) });
        return;
      }
      if (external) {
        if (DO_CLICKS) send("click", { target: "outbound", label: label, href: href.slice(0, 160) });
        return;
      }
      // Same-origin navigation to another page bundle (*.html) → nav_jump.
      if (DO_NAV && /\.html($|[?#])/i.test(href)) {
        var dest = url ? (url.pathname.split("/").pop() + (url.hash || "")) : href;
        send("nav_jump", { to: String(dest).slice(0, 120), label: label });
      }
    } catch (err) { /* ignore */ }
  }
  if (DO_NAV || DO_CLICKS) {
    document.addEventListener("click", onClick, true);
  }

  // ── engagement_end (visible time, total time, max scroll %, sections) ────────
  var startMs = nowMs();
  var visibleAccum = 0;
  var lastVisibleStart = document.visibilityState === "visible" ? nowMs() : 0;
  var maxScrollPct = 0;
  var sent = false;

  function nowMs() {
    try { return (performance && performance.now) ? performance.timeOrigin + performance.now() : +new Date(); }
    catch (e) { return +new Date(); }
  }
  function updateScrollDepth() {
    try {
      var sh = document.documentElement.scrollHeight - window.innerHeight;
      // Many pages scroll an inner container, not the window — pick the larger.
      var main = document.querySelector(".content, main, .page");
      if (main && main.scrollHeight - main.clientHeight > sh) {
        var sh2 = main.scrollHeight - main.clientHeight;
        if (sh2 > 0) {
          var p2 = Math.round((main.scrollTop / sh2) * 100);
          if (p2 > maxScrollPct) maxScrollPct = Math.min(100, p2);
        }
        return;
      }
      if (sh <= 0) return;
      var pct = Math.round((window.scrollY / sh) * 100);
      if (pct > maxScrollPct) maxScrollPct = Math.min(100, pct);
    } catch (e) {}
  }

  function sendEngagement(reason) {
    if (!DO_ENGAGEMENT || sent) return;
    sent = true;
    if (lastVisibleStart) {
      visibleAccum += nowMs() - lastVisibleStart;
      lastVisibleStart = 0;
    }
    send("engagement_end", {
      reason: reason,
      time_visible_ms: Math.round(visibleAccum),
      time_total_ms: Math.round(nowMs() - startMs),
      max_scroll_pct: maxScrollPct,
      sections_seen: seenCount
    });
  }

  function initEngagement() {
    if (!DO_ENGAGEMENT) return;
    window.addEventListener("scroll", updateScrollDepth, { passive: true, capture: true });
    updateScrollDepth();
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "hidden") {
        sendEngagement("hidden");           // checkpoint — may not be a real exit
      } else if (document.visibilityState === "visible" && sent) {
        sent = false;                        // user returned — new engagement window
        startMs = nowMs();
        visibleAccum = 0;
        lastVisibleStart = nowMs();
      } else if (document.visibilityState === "visible") {
        lastVisibleStart = nowMs();
      }
    });
    window.addEventListener("pagehide", function () { sendEngagement("pagehide"); });
  }

  function boot() {
    observeSections();
    initEngagement();
  }
  if (document.readyState === "complete" || document.readyState === "interactive") {
    boot();
  } else {
    document.addEventListener("DOMContentLoaded", boot);
  }
})();

/* ---- MyFood-kohtainen SPA-instrumentointi: tab-näkymät + sivustohaku ---- */
(function () {
  var lastTab = null, searchTimer = null;
  function pingTab() {
    try {
      if (window.mypa && typeof tab !== 'undefined' && tab !== lastTab) {
        lastTab = tab; window.mypa.send('tab_view', { tab: tab });
      }
    } catch (e) {}
  }
  document.addEventListener('DOMContentLoaded', function () {
    try {
      if (typeof render === 'function') {
        var r0 = render;
        render = function () { r0(); pingTab(); };
      }
      pingTab();
      if (window.onSiteSearch) {
        var s0 = window.onSiteSearch;
        window.onSiteSearch = function (v) {
          s0(v);
          clearTimeout(searchTimer);
          var q = String(v || '').trim();
          if (window.mypa && q.length >= 3) searchTimer = setTimeout(function () {
            window.mypa.send('search', { query: q.slice(0, 80) });
          }, 900);
        };
      }
    } catch (e) {}
  });
})();
function render() {
  if (INTERNAL_IDS.includes(tab)) internalOpen = true;
  syncInternalNav();
  document.querySelectorAll('#nav button, #nav2 button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const el = document.getElementById('main');
  ({etusivu: renderEtusivu, reseptit: renderReseptit, kasittely: renderKasittely,
    analyysi: renderAnalyysi, miksikala: renderMiksiKala, lajit: renderLajit,
    kulttuurit: renderKulttuurit,
    lahteet: renderLahteet, ohjeet: renderOhjeet, tyonkulut: renderTyonkulut,
    ajatus: renderAjatus, kehitys: renderKehitys,
    tietokanta: renderTietokanta, tietomalli: renderTietomalli})[tab](el);
  if (tab === 'miksikala' || tab === 'analyysi' || tab === 'kulttuurit') glossLinkify(el);  // lyhenteet klikattaviksi tekstissä
}
const dlg = document.getElementById('dlg');
// Sulkeminen: taustan klikkaus sulkee; sulkiessa palautetaan osoiterivi taustavälilehteen
dlg.addEventListener('click', e => { if (e.target === dlg) dlg.close(); });
dlg.addEventListener('close', () => {
  pvCurId = null;
  try { history.replaceState(null, '', (pvPrevHash && !/resepti=/.test(pvPrevHash)) ? pvPrevHash : (location.pathname + location.search)); } catch (e) { }
});
render();
// Avaa syvälinkitetty resepti latauksessa
if (pvHashRecipe) { const it = D.items.find(i => i.id === pvHashRecipe); if (it) { pvPrevHash = '#reseptit'; showDetail(pvHashRecipe); } }
